description: FOCUS-aligned FinOps for Microsoft Copilot — predominantly per-user-per-month
  subscription pricing ($30 enterprise, $20 Pro, GitHub Copilot $10–$39) with a metered
  message-based PAYG layer for Copilot Studio. Largest waste signal is paying for inactive
  Copilot seats; secondary signal is Copilot Studio message overage. Visibility comes from
  Microsoft 365 admin center usage reports and Azure Monitor for Copilot Studio.
sources:
  - https://www.microsoft.com/microsoft-365-copilot
  - https://learn.microsoft.com/en-us/microsoft-365-copilot/microsoft-365-copilot-licensing
  - https://learn.microsoft.com/en-us/microsoft-365/admin/activity-reports/microsoft365-copilot-usage
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription + Usage-Based (Copilot Studio messages)
  billingFrequency: Monthly (annual commitment for enterprise SKU)
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Microsoft 365 Copilot
  ServiceCategory: AI / Productivity
  ProviderName: Microsoft Corporation
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  PricingCategory: Subscription
  PricingUnit: user-month
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: m365_copilot_seats
    description: Microsoft 365 Copilot enterprise add-on seats ($30/user/month).
    unit: user-month
    aggregation: max
    dimensions:
      - tenant
      - department
      - cost_center
  - name: copilot_pro_seats
    description: Copilot Pro consumer seats ($20/user/month).
    unit: user-month
    aggregation: max
    dimensions:
      - billing_account
  - name: copilot_studio_messages
    description: Messages consumed by Copilot Studio agents.
    unit: message
    aggregation: sum
    dimensions:
      - agent_name
      - environment
      - generative_or_classifier
  - name: copilot_studio_message_pack
    description: Purchased monthly message-pack capacity.
    unit: message-month
    aggregation: max
    dimensions:
      - tenant
      - pack_size
  - name: github_copilot_seats
    description: GitHub Copilot Individual / Business / Enterprise seats.
    unit: user-month
    aggregation: max
    dimensions:
      - tier
      - org
  - name: copilot_active_users
    description: Unique users with at least one Copilot interaction in the period (utilization
      signal).
    unit: user
    aggregation: count
    dimensions:
      - app_used
      - period
principles:
  - name: Visibility
    description: Microsoft 365 admin center > Reports > Microsoft 365 Copilot usage shows
      per-user per-app interactions over the last 180 days. GitHub Copilot org-level usage
      reports show acceptance rate and active users. Copilot Studio analytics graph message
      consumption per agent. Cost Management exposes seat line items.
  - name: Allocation
    description: Assign seats by Entra ID security group rules tied to department/cost-center.
      For Copilot Studio, environments map to business units; messages aggregate per
      environment. Tag GitHub orgs to drive chargeback.
  - name: Optimization
    description: Reclaim seats from users who haven't used Copilot in 30+ days. Right-size
      Copilot Studio message packs based on actual consumption (don't over-buy headroom).
      Use the smaller Copilot Business SKU instead of enterprise where capability matches.
      Avoid duplicating Copilot Pro for users who already have M365 Copilot. Consolidate
      GitHub Copilot under Business or Enterprise when org has 5+ developers.
  - name: Accountability
    description: License manager owns seat assignment and reconciliation. Quarterly review of
      per-user adoption metrics with line-of-business sponsors. Set alerts on Copilot Studio
      message consumption to avoid PAYG surprises. Track unit economics — cost per active
      user, cost per task automated.
