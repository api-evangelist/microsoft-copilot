  - type: Features
    data:
      - name: Retrieval API
        description: >-
          Retrieve relevant enterprise content from Microsoft 365 using AI-powered retrieval augmented generation with
          permissions and sensitivity label awareness.
      - name: Search API
        description: >-
          Perform semantic search across Microsoft 365 content including SharePoint, OneDrive, and Exchange with
          AI-enhanced ranking.
      - name: Chat API
        description: >-
          Programmatically start and continue conversations with Microsoft 365 Copilot grounded in enterprise and web
          search data.
      - name: Interaction Export
        description: Export and audit Copilot interaction history across the organization for compliance and governance purposes.
      - name: Change Notifications
        description: Subscribe to real-time notifications for Copilot interactions and events across Microsoft 365.
      - name: Copilot Studio
        description: Low-code platform for building custom agents, copilots, and conversational AI experiences.
      - name: Connectors
        description: Bring external data into Microsoft Graph to enhance Copilot search and retrieval capabilities.
      - name: Extensibility
        description: Extend Copilot with custom plugins, agents, and API integrations using declarative or code-first approaches.
  - type: UseCases
    data:
      - name: Enterprise Knowledge Retrieval
        description: >-
          Build applications that retrieve relevant enterprise content from Microsoft 365 while respecting permissions
          and compliance controls.
      - name: AI-Assisted Productivity
        description: >-
          Integrate Copilot capabilities into line-of-business applications for document summarization, drafting, and
          data analysis.
      - name: Custom Agent Development
        description: >-
          Create domain-specific AI agents using Copilot Studio that automate workflows and answer questions from custom
          data sources.
      - name: Compliance and Governance
        description: >-
          Monitor and audit Copilot usage across the organization with interaction history export and change
          notifications.
  - type: Integrations
    data:
      - name: Microsoft 365
        description: Deep integration with Word, Excel, PowerPoint, Outlook, Teams, and other Microsoft 365 applications.
      - name: Microsoft Graph
        description: Access organizational data through the Microsoft Graph API for retrieval, search, and chat capabilities.
      - name: Azure Active Directory
        description: Enterprise authentication and authorization using Azure AD with OAuth 2.0 and OIDC.
      - name: Power Platform
        description: Connect Copilot with Power Automate, Power Apps, and Power BI for end-to-end workflow automation.
