naftiko: 1.0.0-alpha2
info:
  label: Microsoft Copilot Microsoft 365 Copilot APIs — Search
  description: 'Microsoft Copilot Microsoft 365 Copilot APIs — Search. 1 operations. Lead operation: Microsoft Copilot Perform
    Hybrid Search. Self-contained Naftiko capability covering one Microsoft Copilot business surface.'
  tags:
  - Microsoft Copilot
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_COPILOT_API_KEY: MICROSOFT_COPILOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-copilot-search
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Copilot Microsoft 365 Copilot APIs — Search business capability. Self-contained, no shared references.
    resources:
    - name: copilot-search
      path: /copilot/search
      operations:
      - name: copilotsearch
        method: POST
        description: Microsoft Copilot Perform Hybrid Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_COPILOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-copilot-search-rest
    port: 8080
    description: REST adapter for Microsoft Copilot Microsoft 365 Copilot APIs — Search. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/copilot/search
      name: copilot-search
      description: REST surface for copilot-search.
      operations:
      - method: POST
        name: copilotsearch
        description: Microsoft Copilot Perform Hybrid Search
        call: microsoft-copilot-search.copilotsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-copilot-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Copilot Microsoft 365 Copilot APIs — Search. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-copilot-perform-hybrid-search
      description: Microsoft Copilot Perform Hybrid Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: microsoft-copilot-search.copilotsearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
