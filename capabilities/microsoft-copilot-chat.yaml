naftiko: 1.0.0-alpha2
info:
  label: Microsoft Copilot Microsoft 365 Copilot APIs — Chat
  description: 'Microsoft Copilot Microsoft 365 Copilot APIs — Chat. 2 operations. Lead operation: Microsoft Copilot Start
    a Chat Conversation. Self-contained Naftiko capability covering one Microsoft Copilot business surface.'
  tags:
  - Microsoft Copilot
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_COPILOT_API_KEY: MICROSOFT_COPILOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-copilot-chat
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Copilot Microsoft 365 Copilot APIs — Chat business capability. Self-contained, no shared references.
    resources:
    - name: copilot-chat-conversations
      path: /copilot/chat/conversations
      operations:
      - name: copilotchatstartconversation
        method: POST
        description: Microsoft Copilot Start a Chat Conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: copilot-chat-conversations-conversationId-messages
      path: /copilot/chat/conversations/{conversationId}/messages
      operations:
      - name: copilotchatcontinueconversation
        method: POST
        description: Microsoft Copilot Continue a Chat Conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: conversationId
          in: path
          type: string
          description: The unique identifier of the conversation to continue.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_COPILOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-copilot-chat-rest
    port: 8080
    description: REST adapter for Microsoft Copilot Microsoft 365 Copilot APIs — Chat. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/copilot/chat/conversations
      name: copilot-chat-conversations
      description: REST surface for copilot-chat-conversations.
      operations:
      - method: POST
        name: copilotchatstartconversation
        description: Microsoft Copilot Start a Chat Conversation
        call: microsoft-copilot-chat.copilotchatstartconversation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/copilot/chat/conversations/{conversationid}/messages
      name: copilot-chat-conversations-conversationid-messages
      description: REST surface for copilot-chat-conversations-conversationId-messages.
      operations:
      - method: POST
        name: copilotchatcontinueconversation
        description: Microsoft Copilot Continue a Chat Conversation
        call: microsoft-copilot-chat.copilotchatcontinueconversation
        with:
          conversationId: rest.conversationId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-copilot-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Copilot Microsoft 365 Copilot APIs — Chat. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-copilot-start-chat-conversation
      description: Microsoft Copilot Start a Chat Conversation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-copilot-chat.copilotchatstartconversation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-copilot-continue-chat-conversation
      description: Microsoft Copilot Continue a Chat Conversation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-copilot-chat.copilotchatcontinueconversation
      with:
        conversationId: tools.conversationId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
